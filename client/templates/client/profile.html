{% extends "client/base.html" %}

{% block title %}个人中心 - 上海局铁路客票系统{% endblock %}

{% block content %}
<div class="container py-4">
    <h4 class="mb-4"><i class="bi bi-person-circle me-2"></i>个人中心</h4>

    <div class="row">
        <div class="col-md-3">
            <!-- 侧边栏 -->
            <div class="list-group">
                <a href="#info" class="list-group-item list-group-item-action active" data-bs-toggle="list">
                    <i class="bi bi-person me-2"></i>基本信息
                </a>
                <a href="#password" class="list-group-item list-group-item-action" data-bs-toggle="list">
                    <i class="bi bi-lock me-2"></i>修改密码
                </a>
                <a href="/orders" class="list-group-item list-group-item-action">
                    <i class="bi bi-receipt me-2"></i>我的订单
                </a>
            </div>
        </div>
        <div class="col-md-9">
            <div class="tab-content">
                <!-- 基本信息 -->
                <div class="tab-pane fade show active" id="info">
                    <div class="card border-0 shadow-sm">
                        <div class="card-header bg-white">
                            <h6 class="mb-0">基本信息</h6>
                        </div>
                        <div class="card-body">
                            <form method="POST">
                                <input type="hidden" name="action" value="update_info">
                                <div class="row mb-3">
                                    <label class="col-md-2 col-form-label text-muted">用户名</label>
                                    <div class="col-md-10">
                                        <input type="text" class="form-control" value="{{ user.username }}" disabled>
                                        <div class="form-text">用户名不可修改</div>
                                    </div>
                                </div>
                                <div class="row mb-3">
                                    <label class="col-md-2 col-form-label">姓名</label>
                                    <div class="col-md-10">
                                        <input type="text" name="real_name" class="form-control" value="{{ user.real_name or '' }}">
                                    </div>
                                </div>
                                <div class="row mb-3">
                                    <label class="col-md-2 col-form-label">手机号</label>
                                    <div class="col-md-10">
                                        <input type="text" name="phone" class="form-control" value="{{ user.phone or '' }}">
                                    </div>
                                </div>
                                <div class="row mb-3">
                                    <label class="col-md-2 col-form-label">邮箱</label>
                                    <div class="col-md-10">
                                        <input type="email" name="email" class="form-control" value="{{ user.email or '' }}">
                                    </div>
                                </div>
                                <div class="row mb-3">
                                    <label class="col-md-2 col-form-label">身份证号</label>
                                    <div class="col-md-10">
                                        <input type="text" name="id_card" class="form-control" value="{{ user.id_card or '' }}" maxlength="18">
                                    </div>
                                </div>
                                <div class="row">
                                    <div class="col-md-10 offset-md-2">
                                        <button type="submit" class="btn btn-primary">
                                            <i class="bi bi-check-lg me-1"></i>保存修改
                                        </button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>

                <!-- 修改密码 -->
                <div class="tab-pane fade" id="password">
                    <div class="card border-0 shadow-sm">
                        <div class="card-header bg-white">
                            <h6 class="mb-0">修改密码</h6>
                        </div>
                        <div class="card-body">
                            <form method="POST">
                                <input type="hidden" name="action" value="change_password">
                                <div class="row mb-3">
                                    <label class="col-md-3 col-form-label">原密码</label>
                                    <div class="col-md-9">
                                        <input type="password" name="old_password" class="form-control" required>
                                    </div>
                                </div>
                                <div class="row mb-3">
                                    <label class="col-md-3 col-form-label">新密码</label>
                                    <div class="col-md-9">
                                        <input type="password" name="new_password" class="form-control" required minlength="6">
                                        <div class="form-text">密码长度至少6位</div>
                                    </div>
                                </div>
                                <div class="row mb-3">
                                    <label class="col-md-3 col-form-label">确认新密码</label>
                                    <div class="col-md-9">
                                        <input type="password" name="confirm_password" class="form-control" required minlength="6">
                                    </div>
                                </div>
                                <div class="row">
                                    <div class="col-md-9 offset-md-3">
                                        <button type="submit" class="btn btn-primary">
                                            <i class="bi bi-check-lg me-1"></i>修改密码
                                        </button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
