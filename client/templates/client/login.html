{% extends "client/base.html" %}

{% block title %}登录 - 上海局铁路客票系统{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="card border-0 shadow-lg">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <svg viewBox="0 0 40 40" width="48" height="48" class="mb-3">
                            <circle cx="20" cy="20" r="19" fill="#C4161C" stroke="none"/>
                            <path d="M20 6 L12 28 L16 28 L20 16 L24 28 L28 28 Z" fill="white"/>
                            <rect x="10" y="29" width="20" height="3" rx="1" fill="white"/>
                        </svg>
                        <h4 class="mb-1">用户登录</h4>
                        <p class="text-muted small">上海局铁路客票系统</p>
                    </div>
                    
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label">用户名</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-person"></i></span>
                                <input type="text" name="username" class="form-control" required autofocus placeholder="请输入用户名">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">密码</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                <input type="password" name="password" class="form-control" required placeholder="请输入密码">
                            </div>
                        </div>
                        <div class="mb-4">
                            <button type="submit" class="btn btn-danger w-100 py-2">
                                <i class="bi bi-box-arrow-in-right me-2"></i>登录
                            </button>
                        </div>
                    </form>
                    
                    <div class="text-center">
                        <span class="text-muted">还没有账号？</span>
                        <a href="/register" class="text-decoration-none">立即注册</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
