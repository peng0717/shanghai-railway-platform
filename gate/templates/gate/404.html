{% extends "gate/base.html" %}

{% block title %}404 - 页面未找到{% endblock %}

{% block content %}
<div class="gate-error-page">
    <div class="gate-error-content">
        <div class="gate-error-icon">
            <i class="bi bi-question-circle"></i>
        </div>
        <h1 class="gate-error-code">404</h1>
        <h4 class="gate-error-title">页面未找到</h4>
        <p class="gate-error-message">
            抱歉，您访问的页面不存在或已被移除
        </p>
        <a href="/gate/" class="btn btn-gate">
            <i class="bi bi-house me-2"></i>返回首页
        </a>
    </div>
</div>
{% endblock %}
